<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #09090b; overflow: hidden; }
#canvas { width: 100%; height: 100vh; }
.robot-select {
    position: fixed; top: 8px; left: 8px; z-index: 10;
    padding: 6px 10px; border-radius: 8px; border: 1px solid #27272a;
    background: #18181b; color: #fafafa; font-family: 'Inter', sans-serif;
    font-size: 11px; cursor: pointer;
}
.gesture-label {
    position: fixed; bottom: 8px; left: 8px; z-index: 10;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #71717a;
    display: flex; align-items: center; gap: 6px;
}
.gesture-dot { width: 6px; height: 6px; border-radius: 50%; background: #71717a; }
.gesture-dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e40; }
</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
</head>
<body>
<select class="robot-select" id="robot-sel" onchange="switchBot(this.value)">
    <option value="arm" selected>SO-101 Arm</option>
    <option value="humanoid">Unitree G1</option>
    <option value="rover">MentorPi</option>
</select>
<div class="gesture-label">
    <div class="gesture-dot" id="gdot"></div>
    <span id="glabel">idle</span>
</div>
<div id="canvas"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x09090b);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(3, 2.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.8;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0.8, 0);

scene.add(new THREE.AmbientLight(0x8888bb, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(5, 8, 4); key.castShadow = true; scene.add(key);
const rim = new THREE.PointLight(0x3b82f6, 1.0, 15);
rim.position.set(-2, 3, -4); scene.add(rim);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({color:0x12121e, roughness:0.85}));
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
scene.add(new THREE.GridHelper(12, 24, 0x334455, 0x252540));

const M = {
    metal: new THREE.MeshStandardMaterial({color:0xccccdd, metalness:0.6, roughness:0.2}),
    dark: new THREE.MeshStandardMaterial({color:0x2a2a3a, metalness:0.4, roughness:0.3}),
    accent: new THREE.MeshStandardMaterial({color:0x66bbff, metalness:0.3, roughness:0.2, emissive:0x3388ff, emissiveIntensity:0.5}),
    joint: new THREE.MeshStandardMaterial({color:0x77ccff, metalness:0.4, roughness:0.2, emissive:0x3399ff, emissiveIntensity:0.6}),
    body: new THREE.MeshStandardMaterial({color:0xeeeef4, metalness:0.3, roughness:0.35}),
};

// SO-101 Arm
const armGroup = new THREE.Group();
const joints = [];
(function() {
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.4, 0.15, 32), M.dark);
    base.position.y = 0.075; base.castShadow = true; armGroup.add(base);
    armGroup.add(new THREE.Mesh(new THREE.TorusGeometry(0.37, 0.02, 8, 32), M.accent).translateY(0.15).rotateX(Math.PI/2));
    let parent = armGroup;
    [{h:0.12,r:0.12,y:0.15},{h:0.55,r:0.04,y:0.06},{h:0.45,r:0.03,y:0.58},{h:0.12,r:0.03,y:0.5},{h:0.08,r:0.025,y:0.04},{h:0.1,r:0.015,y:0.14}].forEach((s,i) => {
        const g = new THREE.Group(); g.position.y = s.y; parent.add(g); joints.push(g);
        if (i < 3) { const jm = new THREE.Mesh(new THREE.SphereGeometry(s.r*1.5,12,12), M.joint); jm.castShadow=true; g.add(jm); }
        const arm = new THREE.Mesh(new THREE.BoxGeometry(s.r*2, s.h, s.r*2), M.metal);
        arm.position.y = s.h/2; arm.castShadow = true; g.add(arm);
        parent = g;
    });
    scene.add(armGroup);
})();

const gestures = {
    idle:[0,0,0,0,0,0], point_right:[1.2,-0.3,-0.8,0,0,0], arm_raise:[0,-0.2,-0.1,-0.1,0,0],
    fault:[-0.5,0.4,-1.5,-0.8,0.5,0], safe:[0.3,-0.5,-0.5,0,0.3,0], wave:[0,-0.3,-0.6,0,0,0],
};

let currentGesture = 'idle', gestureTime = 0;
function lerp(a,b,t) { return a+(b-a)*t; }

// WebSocket
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
try {
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'gesture') {
            const g = msg.data.gesture || 'idle';
            currentGesture = Object.keys(gestures).includes(g) ? g : 'point_right';
            gestureTime = 0;
            document.getElementById('glabel').textContent = currentGesture;
            document.getElementById('gdot').classList.add('on');
            clearTimeout(window._rt);
            window._rt = setTimeout(() => {
                currentGesture = 'idle';
                document.getElementById('glabel').textContent = 'idle';
                document.getElementById('gdot').classList.remove('on');
            }, 3000);
        }
    };
} catch(e) {}

window.switchBot = function(name) {
    // Future: switch between robot models
};

const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    gestureTime += dt;
    const t = gestures[currentGesture] || gestures.idle;
    joints.forEach((j,i) => {
        const axis = i === 0 || i === 4 ? 'y' : 'z';
        j.rotation[axis] = lerp(j.rotation[axis], t[i], dt*3);
    });
    if (currentGesture === 'wave' && joints[3]) joints[3].rotation.z = Math.sin(gestureTime*6)*0.4;
    controls.update();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
