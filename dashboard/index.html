<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sideline — AI Referee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #111114;
            --elevated: #1a1a1f;
            --border: #27272a;
            --text: #fafafa;
            --muted: #a1a1aa;
            --dim: #71717a;
            --accent: #3b82f6;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --font: 'Inter', -apple-system, sans-serif;
            --mono: 'SF Mono', 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(9,9,11,0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--accent); }
        .header-meta { color: var(--dim); font-size: 12px; }
        .header-actions { display: flex; gap: 8px; }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { background: var(--elevated); border-color: #333; }
        .btn-primary { background: var(--accent); border-color: var(--accent); }
        .btn-primary:hover { background: #2563eb; }

        /* Layout */
        .main {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: auto 1fr;
            gap: 16px;
            padding: 16px 24px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 65px);
        }

        /* Scoreboard */
        .scoreboard {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .player-score {
            text-align: center;
        }
        .player-name {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 4px;
        }
        .player-points {
            font-size: 48px;
            font-weight: 700;
            font-family: var(--mono);
            letter-spacing: -2px;
        }
        .score-detail {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--dim);
            margin-top: 4px;
        }
        .score-separator {
            font-size: 32px;
            color: var(--dim);
            font-weight: 300;
        }
        .serving { color: var(--green); }

        /* Video Area */
        .video-area {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 300px;
            position: relative;
        }
        .video-container video {
            max-width: 100%;
            max-height: 100%;
        }
        .video-placeholder {
            color: var(--dim);
            font-size: 13px;
        }
        .video-controls {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .frame-counter {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--dim);
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        /* Reasoning Panel */
        .reasoning-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
        }
        .events-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .event-card {
            padding: 12px;
            background: var(--elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .event-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .event-type {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .event-type.call { background: #3b82f620; color: var(--accent); }
        .event-type.score { background: #22c55e20; color: var(--green); }
        .event-type.status { background: #71717a20; color: var(--dim); }
        .event-type.gesture { background: #eab30820; color: var(--yellow); }
        .event-frame {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--dim);
        }
        .event-body {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }
        .event-body strong { color: var(--text); }
        .confidence-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }

        .status-bar {
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dim);
        }
        .status-dot.active { background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>sideline</span> referee</div>
        <div class="header-meta" id="header-meta">Disconnected</div>
        <div class="header-actions">
            <button class="btn" onclick="resetGame()">Reset</button>
            <button class="btn btn-primary" id="start-btn" onclick="startAnalysis()">Start</button>
        </div>
    </div>

    <div class="main">
        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="player-score">
                <div class="player-name" id="p1-name">Player 1</div>
                <div class="player-points" id="p1-points">0</div>
                <div class="score-detail" id="p1-detail">Games: 0 | Sets: 0</div>
            </div>
            <div class="score-separator">:</div>
            <div class="player-score">
                <div class="player-name" id="p2-name">Player 2</div>
                <div class="player-points" id="p2-points">0</div>
                <div class="score-detail" id="p2-detail">Games: 0 | Sets: 0</div>
            </div>
        </div>

        <!-- Video -->
        <div class="video-area">
            <div class="video-container">
                <video id="video" controls muted></video>
                <div class="video-placeholder" id="video-placeholder">Drop a video or click Start for mock mode</div>
            </div>
            <div class="video-controls">
                <span class="frame-counter" id="frame-counter">Frame 0</span>
                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>
        </div>

        <!-- Reasoning Panel -->
        <div class="reasoning-panel">
            <div class="panel-header">
                <div class="dot" id="agent-dot"></div>
                Agent Reasoning
            </div>
            <div class="events-list" id="events"></div>
            <div class="status-bar">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>
        </div>
    </div>

<script>
let ws = null;
let connected = false;

function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
        connected = true;
        document.getElementById('header-meta').textContent = 'Connected';
        document.getElementById('status-dot').classList.add('active');
        document.getElementById('status-text').textContent = 'Connected — ready';
    };

    ws.onclose = () => {
        connected = false;
        document.getElementById('header-meta').textContent = 'Disconnected';
        document.getElementById('status-dot').classList.remove('active');
        setTimeout(connect, 2000);
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleEvent(msg.type, msg.data);
    };
}

function handleEvent(type, data) {
    if (type === 'state') {
        updateScore(data.score);
    } else if (type === 'score') {
        updateScore(data.score);
        addEvent('score', data);
    } else if (type === 'call') {
        addEvent('call', data);
    } else if (type === 'gesture') {
        addEvent('gesture', data);
    } else if (type === 'status') {
        document.getElementById('status-text').textContent = data.message || data.description || 'Ready';
        if (data.description) addEvent('status', data);
    } else if (type === 'analysis') {
        document.getElementById('frame-counter').textContent = `Frame ${data.frame}`;
        if (data.content) {
            addEvent('analysis', { description: data.content });
        }
    } else if (type === 'progress') {
        const pct = (data.frame / data.total * 100).toFixed(1);
        document.getElementById('progress').style.width = pct + '%';
        document.getElementById('frame-counter').textContent = `Frame ${data.frame} / ${data.total}`;
    } else if (type === 'error') {
        document.getElementById('status-text').textContent = 'Error: ' + data.message;
    }
}

function updateScore(score) {
    if (!score) return;
    document.getElementById('p1-points').textContent = score.points?.p1 || '0';
    document.getElementById('p2-points').textContent = score.points?.p2 || '0';
    document.getElementById('p1-detail').textContent =
        `Games: ${score.games?.p1 || 0} | Sets: ${score.sets?.p1 || 0}`;
    document.getElementById('p2-detail').textContent =
        `Games: ${score.games?.p2 || 0} | Sets: ${score.sets?.p2 || 0}`;

    // Highlight server
    const server = score.server || 'p1';
    document.getElementById('p1-name').className = 'player-name' + (server === 'p1' ? ' serving' : '');
    document.getElementById('p2-name').className = 'player-name' + (server === 'p2' ? ' serving' : '');
}

function addEvent(type, data) {
    const el = document.getElementById('events');
    const card = document.createElement('div');
    card.className = 'event-card';

    let typeClass = type;
    let body = '';

    if (type === 'call') {
        body = `<strong>${data.call_type?.toUpperCase()}</strong> — ${data.announcement || ''}`;
        if (data.confidence) {
            const pct = (data.confidence * 100).toFixed(0);
            const color = data.confidence > 0.8 ? 'var(--green)' : data.confidence > 0.6 ? 'var(--yellow)' : 'var(--red)';
            body += `<div class="confidence-bar"><div class="confidence-fill" style="width:${pct}%;background:${color}"></div></div>`;
        }
    } else if (type === 'score') {
        body = `<strong>Point:</strong> ${data.player} — ${data.reason}`;
    } else if (type === 'gesture') {
        body = `Robot: <strong>${data.gesture}</strong> ${data.direction || ''}`;
    } else if (type === 'status' || type === 'analysis') {
        typeClass = 'status';
        body = data.description || '';
    }

    card.innerHTML = `
        <div class="event-header">
            <span class="event-type ${typeClass}">${type}</span>
        </div>
        <div class="event-body">${body}</div>
    `;

    el.insertBefore(card, el.firstChild);

    // Keep max 50 events
    while (el.children.length > 50) el.removeChild(el.lastChild);
}

function startAnalysis() {
    if (!connected) return;
    ws.send(JSON.stringify({ action: 'start', video: '' }));
    document.getElementById('start-btn').textContent = 'Running...';
    document.getElementById('start-btn').disabled = true;
    document.getElementById('status-text').textContent = 'Analyzing...';
    document.getElementById('status-dot').classList.add('active');
}

function resetGame() {
    fetch('/reset', { method: 'POST' }).then(() => {
        document.getElementById('events').innerHTML = '';
        document.getElementById('start-btn').textContent = 'Start';
        document.getElementById('start-btn').disabled = false;
        document.getElementById('progress').style.width = '0%';
        document.getElementById('frame-counter').textContent = 'Frame 0';
    });
}

connect();
</script>
</body>
</html>
